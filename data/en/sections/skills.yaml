  categories: ["platforms"]
  url: "https://git-scm.com/"

- name: API & Model Serving
  logo: /images/sections/skills/fastapi.svg
  summary: "Developing REST API endpoints using FastAPI to serve machine learning models and handle basic inference requests."
  categories: ["platforms"]

- name: CI/CD Pipelines
  logo: /images/sections/skills/githubactions.svg
