# Your Skills.
# Give a summary of you each skill in the summary section.
skills:
- name: Python
  logo: /images/sections/skills/c++.png
  summary: "Primary language for geospatial AI pipeline development, model training, and production-grade automation."
  categories: ["languages"]

- name: PostgreSQL
  logo: /images/sections/skills/postgresql.svg
  summary: "Relational database management for geospatial vector data, metadata, and model feedback loops with PostGIS extensions."
  categories: ["languages", "geospatial"]

- name: Bash
  logo: /images/sections/skills/gnubash.svg
  summary: "Automation of data engineering, preprocessing, and deployment operations in Linux environments."
  categories: ["languages", "platforms"]
#
#### ML/DL Frameworks 

- name: PyTorch
  logo: /images/sections/skills/pytorch.svg
  summary: "Primary deep learning framework for model development, experimentation, and deployment in geospatial AI workflows."
  categories: ["ml"]

- name: PyTorch Lightning
  logo: /images/sections/skills/lightning.svg
  summary: "High-level framework for structured deep learning research and production pipelines with advanced training features and scalability."
  categories: ["ml"]  

- name: Detectron2
  logo: /images/sections/skills/Detectron2-Logo-Horz_.png
  summary: "Object detection and segmentation framework used for building geospatial object detection pipelines and instance segmentation models."
  categories: ["ml"]

- name: Scikit-learn
  logo: /images/sections/skills/scikitlearn.svg
  summary: "Core library for classical machine learning algorithms, data preprocessing, and model evaluation in geospatial analytics."
  categories: ["ml", "data"]

- name: OpenCV
  logo: /images/sections/skills/opencv.svg
  summary: "Computer vision library used for fast image manipulation, preprocessing, and feature engineering in multispectral and SAR modeling workflows."
  categories: ["ml", "data"]

- name: Docker
  logo: /images/sections/skills/docker.svg
  summary: "Containerized geospatial ML workflows for reproducible training, inference, and production deployment."
  categories: ["platforms"]
  url: "https://www.docker.com/"

- name: Kubernetes
  logo: /images/sections/skills/kubernetes.png
  summary: "Orchestrates scalable AI and geospatial services for robust production and research environments."
  categories: ["platforms"]
  url: "https://kubernetes.io/"

- name: GDAL/OGR
  summary: "Core stack for large-scale geospatial raster/vector transformations and production geoprocessing pipelines."
  categories: ["geospatial"]

- name: Rasterio, Rioxarray, and Xarray
  summary: "Advanced geospatial raster analytics, reprojection, chunked processing, and scientific data manipulation."
  categories: ["geospatial", "data"]

- name: GeoPandas and Shapely
  summary: "Vector geospatial processing, topology operations, and geometry engineering for ML data preparation."
  categories: ["geospatial"]

- name: NumPy, SciPy, Pandas, and Dask
  summary: "Scientific computing and parallel data processing backbone for high-volume Earth observation analytics."
  categories: ["data"]

- name: Linux
  logo: /images/sections/skills/linux.png
  summary: "Primary operating environment for development, orchestration, and scalable geospatial compute workloads."
  categories: ["platforms"]

- name: Git
  logo: /images/sections/skills/git.png
  summary: "Version control, collaborative code review, and structured research-to-production workflow management."
  categories: ["platforms"]
  url: "https://git-scm.com/"
